<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <a href="../../index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Bosh sahifaga</a>

    <div class="stopwatch">
        <h1 id="display">00:00:00</h1>
        <div class="buttons">
            <button id="startStopBtn" onclick="startStop()"><i class="fas fa-play"></i> Boshlash</button>
            <button id="resetBtn" onclick="reset()"><i class="fas fa-redo"></i> Qayta o'rnatish</button>
        </div>
        
        <ul id="laps">
            <!-- Laps display here -->
        </ul>
        <button id="lapBtn" onclick="recordLap()" style="margin-top: 15px; background: #60a5fa; color: #fff;">
            <i class="fas fa-flag"></i> Davrani saqlash
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
